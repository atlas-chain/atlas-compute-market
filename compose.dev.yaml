# Dev dependencies only (spec §2): the durable store and the ephemeral state
# store, exposed on host ports for a locally-run app. Bring up with
# `docker compose -f compose.dev.yaml up -d`, then `bun start`.
# The default compose.yaml runs the full production stack in containers.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
